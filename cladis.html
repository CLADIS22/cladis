<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Conference</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#121212;
    color:white;
}
.video-box{
    height:250px;
    background:#2b2b2b;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    margin-bottom:20px;
}
.controls{
    position:fixed;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
}
button{
    margin:5px;
}
</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">Video Conference</h2>

<div class="row">

<div class="col-md-6">
<div class="video-box">
Your Video
</div>
</div>

<div class="col-md-6">
<div class="video-box">
Participant Video
</div>
</div>

</div>

</div>

<div class="controls">

<button class="btn btn-success">🎤 Mic</button>

<button class="btn btn-primary">📹 Camera</button>

<button class="btn btn-warning">🖥️ Share Screen</button>

<button class="btn btn-info">💬 Chat</button>

<button class="btn btn-danger">📞 End Call</button>

</div>

</body>
</html>
